name: 1 - Continuous Integration
run-name: "${{ github.workflow }}"

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  WEB_IMAGE_NAME: secure-doc-platform-web
  DB_IMAGE_NAME: secure-doc-platform-db

jobs:

  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit

      - name: Run Flake8 linting
        run: |
          flake8 web/app tests/ web 

  test:
      # This will run on a new ubuntu machine
    runs-on: ubuntu-latest
    
    steps:
        # This is to clone the repository to the machine (needs to be made manually)
      - name: Checkout repository
        uses: actions/checkout@v6

        # Startin the application inside the machine
      - name: Start application stack for validation
        run: |
          docker compose up -d --build
    
      
      - name: Wait for application # This is a health check. Waits 60 seconds until the application is ready. Prevent tests to for being executed in half way environment
        run: |
          timeout=60
          elapsed=0

          until curl -fs http://localhost:8000/health > /dev/null; do
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "Application did not become ready within ${timeout}s"
              exit 1
            fi

            echo "Waiting for application..."
            sleep 2
            elapsed=$((elapsed+2))
          done

          echo "Application is ready"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run smoke tests
        run: |
          pytest -q tests/test_smoke.py

      - name: Stop stack
        if: always() # Happens everythime. Aslo we have the succed() and the failed()
        run: |
          docker compose down -v --remove-orphans

  # Gitleaks
  secrets:

    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
    
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
            fetch-depth: 0 # Required for Gitleaks to scan full history
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN}}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          
      - name: Save Gitleaks Report
        id: save-gitleaks-report
        if: failure() && steps.gitleaks-secrets.outcome == 'failure'
        run: |
          # The gitleaks-action outputs to gitleaks-report.json by default
          if [ -f gitleaks-report.json ]; then
            mkdir -p results
            cp gitleaks-report.json results/gitleaks-report.json
            echo "Gitleaks report saved to results/gitleaks-report.json"
    
            # Display summary
            echo "### Gitleaks Findings ###"
            cat gitleaks-report.json | jq -r '.[] | "Secret: \(.Description)\nFile: \(.File)\nLine: \(.StartLine)"'
          else
            echo "No gitleaks report found"
          fi
          
  sast:
    name: Bandit SAST Scan
    runs-on: ubuntu-latest
    needs: test

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6
    
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Create results directory for Bandit
        run: mkdir -p results

      - name: Run Bandit SAST Scan
        run: |
          bandit -c security-tools/bandit-config.yml -r app/ -f json -o results/bandit-report.json --severity-level high

  dependency:
    name: Dependency Scanning (Pip Audit)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
    
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@v1.4.0
        with:
          inputs: 'web/requirements.txt'
              
  build-and-push:
    runs-on: ubuntu-latest
    needs: [ test, dependency, sast,  secrets ]
    if: github.event_name == 'push' # Apenas contece quando há um push e não quando um pull requeste é feito

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase image namespace
        run: | # This é para guardar o nome de quem criou o repositorio em letra minusculas por causa do ghcr que só aceita tudo em letras minusculas. Ele usa o 'tr' que pega no stdin em UPPER e enviar para o stdout com LOWER. Isto está a ser guardado no $GITHUB_ENV que guarda variaveis no environment do github
          echo "IMAGE_NAMESPACE_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV" 

          
      - name: Log in to GHCR # Login automático no GHCR para guardar as imagens. 
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Refere-se a quem criou o pull request ou push
          password: ${{ secrets.GITHUB_TOKEN }} # Token criado automáticamente, não é necessário que seja configurado

      - name: Set image tags
        run: | # Está a criar as variávies da tag que as imagens serão guardadas
          echo "WEB_SHA_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV" 
          echo "DB_SHA_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE_LC }}/${{ env.DB_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx # Tudo que está aqui para baixo é para construir as imagens e enviá-las para o GHRC
        uses: docker/setup-buildx-action@v4

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: ./web
          push: true
          tags: |
            ${{ env.WEB_SHA_TAG }}
          provenance: false

      - name: Scan Docker image WEB with Trivy
        uses: aquasecurity/trivy-action@v0.9.0
        with:
          image-ref: ${{ env.WEB_SHA_TAG }}
          output: 'results/trivy-web-report.txt'
          format: 'table'
          exit-code: '1' # Fail the build if vulnerabilities are found
          severity: 'HIGH,CRITICAL' # Only report high and critical vulnerabilities

      - name: Generate Trivy Web Docker Image Summary 
        if: always()
        run: |
          if [ -f results/trivy-web-report.txt ]; then
            echo "### Trivy Scan Results ###"
            cat results/trivy-web-report.txt | jq -r '.Results[] | select(.Vulnerabilities != null) | .Vulnerabilities[] | select(.Severity == "HIGH" or .Severity == "CRITICAL") | "\(.Severity): \(.VulnerabilityID) in \(.PkgName) \(.InstalledVersion)"'
          fi

      - name: Generate SBOM for WEB Docker image
        uses: anchore/scan-action@v0
        with:
          image: ${{ env.WEB_SHA_TAG }}
          output-file: sbom_WEB.cdx.json
          format: cyclonedx-json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.sha }}
          path: sbom_WEB.cdx.json

      - name: Build and push db image
        uses: docker/build-push-action@v7
        with:
          context: ./db
          push: true
          tags: |
            ${{ env.DB_SHA_TAG }}
          provenance: false

      - name: Scan DB Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.9.0
        with:
          image-ref: ${{ env.DB_SHA_TAG }}
          output: 'results/trivy-db-report.txt'
          format: 'table'
          exit-code: '1' # Fail the build if vulnerabilities are found
          severity: 'HIGH,CRITICAL' # Only report high and critical vulnerabilities

      - name: Generate Trivy DB Docker Image Summary 
        if: always()
        run: |
          if [ -f results/trivy-db-report.txt ]; then
            echo "### Trivy Scan Results ###"
            cat results/trivy-db-report.txt | jq -r '.Results[] | select(.Vulnerabilities != null) | .Vulnerabilities[] | select(.Severity == "HIGH" or .Severity == "CRITICAL") | "\(.Severity): \(.VulnerabilityID) in \(.PkgName) \(.InstalledVersion)"'
          fi

      - name: Generate SBOM for DB Docker image
        uses: anchore/scan-action@v0
        with:
          image: ${{ env.DB_SHA_TAG }}
          output-file: sbom_DB.cdx.json
          format: cyclonedx-json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.sha }}
          path: sbom_DB.cdx.json
